<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .header {
            margin-bottom: 20px;
        }

        .title {
            font-size: 20px;
            color: #8A05BE;
            font-weight: bold;
        }

        .subtitle {
            color: #666;
            font-size: 12px;
        }

        .card {
            background: #fafafa;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .total {
            font-size: 24px;
            font-weight: bold;
            color: #8A05BE;
        }

        .resumo {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .resumo div {
            font-size: 12px;
        }

        .pago {
            color: green;
        }

        .pendente {
            color: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 12px;
            color: #888;
            padding-bottom: 8px;
        }

        td {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .valor {
            text-align: right;
            font-weight: bold;
        }

        .status {
            font-size: 11px;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="title">Fatura</div>
        <div class="subtitle" th:text="${fatura.referencia}"></div>
    </div>

    <!-- TOTAL -->
    <div class="card">
        <div>Total da fatura</div>
        <div class="total"
             th:text="${#numbers.formatDecimal(fatura.valorTotal, 1, 'POINT', 2, 'COMMA')}">
        </div>

        <div class="resumo">
            <div>
                Pago<br/>
                <span class="pago">R$ 0,00</span>
            </div>
            <div>
                Pendente<br/>
                <span class="pendente">R$ 0,00</span>
            </div>
        </div>
    </div>

    <!-- LISTA -->
    <div class="card">
        <table>
            <thead>
            <tr>
                <th>Descrição</th>
                <th>Data</th>
                <th class="valor">Valor</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="d : ${fatura.despesas}">
                <td>
                    <div th:text="${d.nome}"></div>
                    <div class="status"
                         th:classappend="${d.statusPagamento.name() == 'PAGO'} ? 'pago' : 'pendente'"
                         th:text="${d.statusPagamento}">
                    </div>
                </td>

                <td th:text="${#temporals.format(d.dataVencimento, 'dd/MM')}"></td>

                <td class="valor"
                    th:text="${#numbers.formatDecimal(d.valorTotal, 1, 'POINT', 2, 'COMMA')}">
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
